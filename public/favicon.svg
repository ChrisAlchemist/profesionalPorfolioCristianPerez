<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#09090b"/>

  <!-- Left brace { -->
  <g filter="url(#glow)">
    <path fill="url(#grad)" d="
      M 40,6
      C 22,6 16,16 16,29
      C 16,39 16,44 6,51
      C 16,58 16,63 16,73
      C 16,86 22,94 40,94
      L 40,82
      C 27,82 24,76 24,73
      C 24,64 24,59 14,51
      C 24,43 24,38 24,29
      C 24,24 27,18 40,18
      Z
    "/>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; -6 0; -6 0; 0 0; 0 0"
      keyTimes="0; 0.3; 0.55; 0.75; 1"
      dur="2.5s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
    />
  </g>

  <!-- Right brace } -->
  <g filter="url(#glow)">
    <path fill="url(#grad)" d="
      M 60,6
      C 78,6 84,16 84,29
      C 84,39 84,44 94,51
      C 84,58 84,63 84,73
      C 84,86 78,94 60,94
      L 60,82
      C 73,82 76,76 76,73
      C 76,64 76,59 86,51
      C 76,43 76,38 76,29
      C 76,24 73,18 60,18
      Z
    "/>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 6 0; 6 0; 0 0; 0 0"
      keyTimes="0; 0.3; 0.55; 0.75; 1"
      dur="2.5s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
    />
  </g>
</svg>
